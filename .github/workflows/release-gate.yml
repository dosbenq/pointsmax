name: Release Gate

on:
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
      SUPABASE_SERVICE_ROLE_KEY: example-service-role-key
      NEXT_PUBLIC_APP_URL: https://pointsmax.com
      CORS_ALLOWED_ORIGINS: https://pointsmax.com
      HEALTHCHECK_SECRET: release-health-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Environment check
        run: npm run check:env

      - name: Preflight
        run: npm run preflight

      - name: Link health
        run: npm run check:links

      - name: Smoke test built app
        run: npm run smoke:http
