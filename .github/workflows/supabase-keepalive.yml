name: Supabase Keepalive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL secret is missing"
            exit 1
          fi
          curl -f --retry 3 --retry-delay 2 "${{ secrets.APP_URL }}/api/health"
