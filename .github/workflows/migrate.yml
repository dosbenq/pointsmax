name: Database Migrations

# Runs automatically after CI passes on every push to main.
# Never runs on PRs — migrations only apply to production on merge.
on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'   # only trigger when a migration file changes
      - '.github/workflows/migrate.yml'

  workflow_dispatch:               # allow manual trigger from GitHub Actions tab
    inputs:
      dry_run:
        description: 'Dry run — show pending migrations without applying'
        required: false
        default: 'false'
        type: boolean

jobs:
  migrate:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Reconcile migration history (bootstrap)
        # One-time fix: the initial schema (001-020) was applied manually via the
        # Supabase SQL Editor before this automation existed. The CLI has no record
        # of them. Mark them as applied so db push only runs truly new migrations.
        # Safe to re-run: `migration repair` is idempotent.
        # IMPORTANT: Do NOT include 021 here — let db push apply it.
        run: |
          ALREADY_APPLIED=(
            001_initial_schema
            002_auth_preferences
            003_cards_and_alerts
            004_users_rls
            005_card_affiliate_urls
            006_india_programs
            007_india_cards
            008_affiliate_clicks
            009_security_hardening_rls
            010_flight_watches
            011_fix_india_valuations
            012_knowledge_base
            013_vector_search_rpc
            014_knowledge_hardening
            015_link_health_log
            016_creator_links
            017_shared_trips
            018_onboarding_email_log
            019_transfer_bonus_automation
            020_admin_audit_log
          )
          for version in "${ALREADY_APPLIED[@]}"; do
            echo "Marking $version as applied..."
            supabase migration repair --linked --status applied "$version"
          done
          echo "Bootstrap reconcile complete — 001-020 marked as applied."
          echo "Current remote migration state:"
          supabase migration list --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Show pending migrations (dry run)
        if: ${{ inputs.dry_run == 'true' }}
        run: supabase db push --dry-run --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply pending migrations
        if: ${{ inputs.dry_run != 'true' }}
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify schema (post-migration smoke check)
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          # Quick sanity: confirm all expected tables exist
          supabase db execute --linked --sql "
            SELECT tablename FROM pg_tables
            WHERE schemaname = 'public'
            ORDER BY tablename;
          "
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
