name: Database Migrations

# Runs automatically after CI passes on every push to main.
# Never runs on PRs — migrations only apply to production on merge.
on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrate.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show pending migrations without applying'
        required: false
        default: 'false'
        type: boolean

jobs:
  migrate:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Supabase SQL API access
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py check

      - name: Apply pending migrations
        if: ${{ inputs.dry_run != 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py apply --verify

      - name: Show pending migrations (dry run)
        if: ${{ inputs.dry_run == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py dry-run

      - name: Verify schema (post-migration smoke check)
        if: ${{ inputs.dry_run != 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py verify
