name: Database Migrations

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show pending migrations without applying'
        required: false
        default: 'false'
        type: boolean

jobs:
  migrate:
    name: Apply pending migrations
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: database-migrations-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate migration policy
        run: node scripts/check-migration-policy.mjs

      - name: Validate Supabase SQL API access
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py check

      - name: Apply pending migrations
        if: ${{ inputs.dry_run != true }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py apply --verify

      - name: Show pending migrations (dry run)
        if: ${{ inputs.dry_run == true }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py dry-run

      - name: Verify schema (post-migration smoke check)
        if: ${{ inputs.dry_run != true }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/supabase-management-migrate.py verify
