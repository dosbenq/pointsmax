name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
      SUPABASE_SERVICE_ROLE_KEY: example-service-role-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:4010
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:4010,http://localhost:3000
      HEALTHCHECK_SECRET: ci-health-secret
      QUALITY_GATE_MODE: enforce
      BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      HEAD_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Smoke test built app
        run: npm run smoke:http

      - name: Engineering docs gate
        run: npm run quality:docs

      - name: Architecture boundaries gate
        run: npm run quality:boundaries

      - name: No new any gate
        run: npm run quality:no-new-any

      - name: Hardcoded URL/config guard
        run: npm run quality:no-hardcoded

      - name: Changed-scope test policy
        run: npm run quality:test-policy

      - name: PM dossier freshness
        run: npm run quality:pm-dossier

      - name: Migration naming check
        # Enforce sequential numbering — catch mistakes like duplicate or skipped numbers
        run: |
          files=$(ls supabase/migrations/*.sql | xargs -I{} basename {} | sort)
          prev=0
          for f in $files; do
            num=$(echo "$f" | grep -o '^[0-9]\+' | sed 's/^0*//')
            if [ -z "$num" ]; then continue; fi
            expected=$((prev + 1))
            if [ "$num" -ne "$expected" ] && [ "$prev" -ne 0 ]; then
              echo "Migration numbering gap or duplicate: expected ${expected}, got ${num} (file: $f)"
              exit 1
            fi
            prev=$num
          done
          echo "Migration sequence OK (${prev} files)"

  quality-gate:
    runs-on: ubuntu-latest
    needs: [verify]
    if: always()
    steps:
      - name: Aggregate required quality checks
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "verify job failed"
            exit 1
          fi
          echo "quality-gate passed"
