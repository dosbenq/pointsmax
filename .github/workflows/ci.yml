name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
      SUPABASE_SERVICE_ROLE_KEY: example-service-role-key
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:4010
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:4010,http://localhost:3000
      HEALTHCHECK_SECRET: ci-health-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Smoke test built app
        run: npm run smoke:http
